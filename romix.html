<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Mes Mi Princesa bella</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    text-align: center;
    padding: 50px;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color: #fff;
    margin: 0;
    height: 100vh;
}

h1 {
    font-family: 'Pacifico', cursive;
    font-size: 42px;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
}

p {
    font-size: 22px;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
}

img {
    width: 130px;
    border-radius: 15px;
    margin-top: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

.heart {
    font-size: 30px;
    animation: latir 1s infinite;
    color: hotpink;
    margin: 20px 0;
}

@keyframes latir {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
}

button {
    background-color: #660029;
    color: #ffffff;
    padding: 15px 30px;
    border: none;
    font-size: 18px;
    cursor: pointer;
    margin-top: 20px;
    border-radius: 5px;
    transition: 0.3s;
}

button:hover {
    background-color: #ff6699;
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background-color: #fff0f5;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    max-width: 400px;
    color: #660029;
}

.modal-content h2 {
    font-family: 'Pacifico', cursive;
}

.close {
    position: absolute;
    top: 20px; right: 30px;
    font-size: 28px;
    color: #fff;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>¡Hola Mi romix linda! 💘</h1>

<!-- FOTO -->
<img src="romix.jpeg" alt="Nosotros">

<p>Te amo como no te imaginas 😻</p>

<!-- TEXTO QUE SE ESCRIBE SOLO -->
<p id="mensaje"></p>

<div class="heart">❤️‍🔥</div>

<button onclick="responder('si')">¿Quieres leer unas palabras que te escribí?🥰</button>
<button onclick="responder('no')">No quiero, odio leer...🙄</button>

<!-- Modal -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="cerrarModal()">&times;</span>
        <h2>💖 Para ti, mi amor 💖</h2>
        <p>Haz clic para leer lo que escribí 🥰</p>
        <button onclick="abrirPDF()">Leer PDF</button>
    </div>
</div>

<script>
// TEXTO EFECTO ESCRITURA
let texto = "Gracias por estos 1.7 meses tan hermosos 💖 Eres los mas especial de mi vida, y espero sean muchos años mas juntos. 🥺✨";
let i = 0;

function escribir() {
    if (i < texto.length) {
        document.getElementById("mensaje").innerHTML += texto.charAt(i);
        i++;
        setTimeout(escribir, 40);
    }
}

escribir();

// BOTONES
function responder(respuesta) {
    if(respuesta === 'si'){
        document.getElementById('modal').style.display = 'flex';
    } else {
        alert("OK, No lo leas.🙄 😭💘");
    }
}

function cerrarModal() {
    document.getElementById('modal').style.display = 'none';
}

function abrirPDF() {
    window.open('pa la romix.pdf', '_blank');
    cerrarModal();
}

window.onclick = function(event) {
    let modal = document.getElementById('modal');
    if(event.target === modal){
        cerrarModal();
    }
}
</script>

</body>
</html>
